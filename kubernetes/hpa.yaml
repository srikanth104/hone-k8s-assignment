apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: home-api-hpa
  namespace: home
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: home-api

  minReplicas: 4
  maxReplicas: 10

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70